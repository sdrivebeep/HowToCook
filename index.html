<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>HowToCook 文档</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Docsify 样式 CDN -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
  <div id="app"></div>
  <script>
    // Docsify 配置
    // 这是 Docsify 项目的基本配置，包括项目名称和仓库地址
    window.$docsify = {
      name: 'HowToCook',
      repo: 'Anduin2017/HowToCook'
    }
  </script>
  <!-- Docsify 主脚本 CDN -->
  <!-- 这是 Docsify 框架的核心 JavaScript 文件，用于渲染文档 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- 引入自定义脚本用于滚动到顶部 -->
  <!-- 这个脚本将处理页面内部导航时的滚动问题 -->
  <script src="scroll-fix.js"></script>
</body>
</html>
